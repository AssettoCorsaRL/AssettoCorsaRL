model:
  num_cells: 256
  lr: 3e-4
  actor_lr: 1e-4
  critic_lr: 3e-4
  max_grad_norm: 10.0

  bc_pretrained_model: null
  vae_checkpoint_path: "D:/acrl/AssetoCorsaRL/models/loss=0.1050.ckpt" #* IMPORTANT: Path to pretrained encoder to load for VAE training
  replay_buffer_path: null

  gamma: 0.99
  tau: 0.01

  alpha: 1.0
  alpha_lr: 3e-4
  alpha_min: 0.0001

  batch_size: 512
  replay_size: 200_000 # each transition ≈ 127 KB (2× uint8 84×84×9). 200k ≈ 25 GB.

  updates_per_step: 2
  actor_update_delay: 2

  freeze_encoder_steps: 100_000_000 # "never" unfreeze it

  load_initial: true

  per_alpha: 0.6
  per_beta: 0.4

  #* noisy - IGNORE IF use_noisy=false
  use_noisy: false
  noise_sigma: 0.45

  #* exploration - IGNORE IF use_noisy=true
  explore_start: 0
  explore_end: 0
  explore_steps: 1

  min_q_target: -50
  max_q_target: 50

  number_times_single_memory_is_used_before_discard: 32

  cumul_memories_used: 0
  cumul_memories_should_have_been_used: 0
  max_pacing_lag_batches: 1000

  compile_models: false
  compile_mode: "reduce-overhead" # default | reduce-overhead | max-autotune

  lr_scheduler: "linear" # cosine | linear | none
  lr_warmup_steps: 0 # gradient-update steps of linear warmup (0 to disable)
  lr_min_factor: 0.05 # minimum LR = initial_lr * lr_min_factor
