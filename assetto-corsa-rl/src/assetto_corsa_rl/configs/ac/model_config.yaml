model:
  num_cells: 256
  lr: 3e-4
  actor_lr: 1e-4
  critic_lr: 3e-4
  max_grad_norm: 1.0

  bc_pretrained_model: "D:/acrl/AssetoCorsaRL/models/bc_sac_pretrained.pt" # path to BC actor (pretrain_bc.py)
  vae_checkpoint_path: "D:/acrl/AssetoCorsaRL/models/loss=0.1050.ckpt" #* IMPORTANT: Path to pretrained encoder to load for VAE training
  replay_buffer_path: null

  gamma: 0.99
  tau: 0.01

  alpha: 0.5
  alpha_lr: 3e-4
  alpha_min: 0.1

  batch_size: 128
  replay_size: 1_000_000

  updates_per_step: 1 #TODO: support float values for ts
  actor_update_delay: 2

  freeze_encoder_steps: 50000

  load_initial: true

  per_alpha: 0.6
  per_beta: 0.4

  #* noisy - IGNORE IF use_noisy=false
  use_noisy: false
  noise_sigma: 0.5

  #* exploration - IGNORE IF use_noisy=true
  explore_start: 0.3 # 0.3 if starting with BC agent, else 1.0
  explore_end: 0.03
  explore_steps: 500_000
