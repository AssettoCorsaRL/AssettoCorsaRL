environment:
  num_envs: 1 # ac env doesn't support parallel envs
  frames_per_batch: 1024
  racing_line_path: "https://assettocorsarl.github.io/AssettoCorsaRL-DOCS/json/brazil_racing_lines.json" # path to racing line data file
  # TODO: allow links to the docs (where there will be pleanty of jsons for different maps)

  normalize_observations: true # whether to normalize vector observations to around [-1, 1]
  # (not a strict [-1, 1], values may bounce above and below this threshold)

  inputs:
    speed_kmh: true
    speed_mph: false
    speed_ms: false
    rpm: true
    gear: true
    velocity_x: true
    velocity_y: true
    velocity_z: true
    acceleration_x: true
    acceleration_y: true
    acceleration_z: true

    # car state
    fuel: false
    tyres_off_track: true
    in_pit_lane: false
    damage: false
    cg_height: false
    drive_train_speed: false

    # DRS/ERS/KERS
    drs_available: false
    drs_enabled: false
    has_drs: false
    has_ers: false
    has_kers: false

    # inputs (current)
    gas: true
    brake: true
    clutch: true
    steer: true

    # lap info
    current_lap_time: false
    last_lap_time: false
    best_lap_time: false
    lap_count: false
    lap_delta: false
    current_sector: false
    invalid_lap: false

    # Track/Session info
    track_length: false
    air_temp: false
    road_temp: false
    session_status: false

    # Tyre info (per-tyre averages or specific tyres)
    tyre_wear_avg: true
    tyre_pressure_avg: true
    tyre_temp_avg: true
    tyre_dirty_avg: false
    tyre_slip_ratio_avg: true
    tyre_slip_angle_avg: true

    # Individual tyre temps (front-left, front-right, rear-left, rear-right)
    tyre_0_temp_i: true
    tyre_0_temp_m: true
    tyre_0_temp_o: true
    tyre_1_temp_i: true
    tyre_1_temp_m: true
    tyre_1_temp_o: true
    tyre_2_temp_i: true
    tyre_2_temp_m: true
    tyre_2_temp_o: true
    tyre_3_temp_i: true
    tyre_3_temp_m: true
    tyre_3_temp_o: true

  # Normalization bounds for observations (min, max) - scales to [-1, 1]
  # Only used if normalize_observations=true
  normalization_bounds:
    speed_kmh: [0, 300]
    speed_mph: [0, 186]
    speed_ms: [0, 83]
    rpm: [0, 8000]
    gear: [0, 8]
    velocity_x: [-50, 50]
    velocity_y: [-50, 50]
    velocity_z: [-50, 50]
    acceleration_x: [-30, 30]
    acceleration_y: [-30, 30]
    acceleration_z: [-30, 30]
    fuel: [0, 100]
    tyres_off_track: [0, 4]
    cg_height: [-2, 2]
    drive_train_speed: [0, 400]
    damage: [0, 100]
    gas: [0, 1]
    brake: [0, 1]
    clutch: [0, 1]
    steer: [-260, 260]
    current_lap_time: [0, 300]
    last_lap_time: [0, 300]
    best_lap_time: [0, 300]
    lap_count: [0, 100]
    lap_delta: [-10, 10]
    current_sector: [0, 3]
    track_length: [0, 50000]
    air_temp: [-50, 50]
    road_temp: [-50, 150]
    tyre_wear_avg: [0, 100]
    tyre_pressure_avg: [20, 30]
    tyre_temp_avg: [0, 150]
    tyre_dirty_avg: [0, 100]
    tyre_slip_ratio_avg: [0, 2]
    tyre_slip_angle_avg: [0, 50]
    tyre_0_temp_i: [0, 150]
    tyre_0_temp_m: [0, 150]
    tyre_0_temp_o: [0, 150]
    tyre_1_temp_i: [0, 150]
    tyre_1_temp_m: [0, 150]
    tyre_1_temp_o: [0, 150]
    tyre_2_temp_i: [0, 150]
    tyre_2_temp_m: [0, 150]
    tyre_2_temp_o: [0, 150]
    tyre_3_temp_i: [0, 150]
    tyre_3_temp_m: [0, 150]
    tyre_3_temp_o: [0, 150]
